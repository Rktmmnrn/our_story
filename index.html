<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fdf8f2" />

  <!-- Préchargement des ressources critiques -->
  <link rel="preconnect" href="/api/v1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet" />
    
  <!-- Préchargement du bundle principal -->
  <link rel="modulepreload" href="/src/main.tsx" />
  <title>Notre Histoire ♡</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♡</text></svg>" />
</head>

<body>
  <div id="root"></div>

  <!-- Script d'optimisation du chargement -->
  <script type="module">
    // Préchargement conditionnel basé sur l'authentification
    (async () => {
      const token = localStorage.getItem('access_token');
      if (token) {
        // Précharge la page app si l'utilisateur est connecté
        const link = document.createElement('link');
        link.rel = 'modulepreload';
        link.href = '/assets/js/page-app-*.js';
        document.head.appendChild(link);
      }
    })();
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
